<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./CSS/style.css">
    <script type="module" src="./JS/app.js"></script>
</head>
<body>
    <h1>📋 Todo App</h1>
    <section id="reminderTasks">
        <div id="tasksAdding">
            <input type="text" name="" id="taskAddInput">
            <button id="addTaskBtn">Add</button>
        </div>
        <br>
        <div id="tasksFilter">
            Filters:
            <select name="filter" id="tasksSelection">
                <option value="all">All</option>
                <option value="completed">Completed</option>
                <option value="in-progress">In Progress</option>
            </select>
            | Showing <span id="taskCount">0</span> task(s)
        </div>
        <br>
        <div id="tasksSearching">
            Search: <input type="text" name="" id="taskSearchInput">
        </div>
        <br>
        <div id="tasksContainer">
            <br>
        </div>
        <br>
        <div id="operationsState"></div>
        <br>
    </section>
    <section id="organizedTasks">
        
    </section>
</body>
</html>
